<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>windlink</title>
    </head>
    <body>
        <h1>windlink</h1>
        <a href="https://github.com/connorslade/windlink">Source Code</a>

        <h2>Status</h2>
        <p>Waiting for nmea2000 messages.</p>

        <h2>Firmware Update</h2>
        <button id="update-mode">Enter update mode</button>
    </body>

    <script>
        let updateMode = document.querySelector("#update-mode");

        updateMode.addEventListener("click", async () => {
            await fetch("/update", {
                method: "POST",
            });
            window.location.reload(true);
        });
    </script>
</html>
