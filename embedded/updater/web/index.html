<!doctypehtml><html lang=en><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>windlink</title><style>#progress{display:none;width:160px}</style><h1>windlink boot menu</h1><p>Be careful here, booting into an invalid image will require physical board access to recover from.<h2>Flash Firmware</h2><button disabled id=flash>Flash</button> <input accept=.bin id=bin type=file><br><progress id=progress max=100 value=0></progress><p id=message><script>bin.addEventListener("change",()=>{flash.disabled=0===bin.files.length}),flash.addEventListener("click",()=>{if(!bin.files.length)return alert("No file selected.");var e=bin.files[0];flash.disabled=!0,progress.style.display="block",progress.value=0,message.innerText="Uploading... 0%";let l=new XMLHttpRequest;l.open("POST","/flash",!0),l.upload.onprogress=e=>{e.lengthComputable&&(e=Math.round(e.loaded/e.total*100),progress.value=e,message.innerText=`Uploading... ${e}%`)},l.onload=()=>{if(200===l.status){let e=5;message.innerText=`Update successful. Reloading in ${e}s...`;const s=setInterval(()=>{message.innerText=`Update successful. Reloading in ${--e}s...`,e<=0&&(clearInterval(s),location.reload())},1e3)}else message.innerText="Update failed",flash.disabled=!1},l.onerror=()=>{message.innerText="Error uploading file",flash.disabled=!1},l.send(e)})</script>
