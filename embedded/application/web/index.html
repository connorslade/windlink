<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>windlink</title>
    </head>
    <body>
        <h1>windlink</h1>
        <a href="https://github.com/connorslade/windlink">Source Code</a>

        <h2>Status</h2>
        <p>Waiting for nmea2000 messages.</p>

        <h2>Firmware Update</h2>
        <button id="update-mode">Enter boot menu</button>
    </body>

    <script>
        document.querySelector("#update-mode").addEventListener("click", () => {
            fetch("/update", {
                method: "POST",
            }).then(() => {
                setTimeout(() => window.location.reload(true), 5000);
            });
        });
    </script>
</html>
