<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>windlink</title>
    </head>
    <body>
        <h1>windlink</h1>
        <a href="https://github.com/connorslade/windlink">Source Code</a>

        <h2>Status</h2>
        <pre id="logs"></pre>

        <h2>Firmware Update</h2>
        <button id="update">Enter boot menu</button>
        <p id="updateStatus"></p>
    </body>

    <script>
        async function fetchLogs() {
            const res = await fetch("/logs");
            logs.innerText = await res.text();
        }
        fetchLogs();
        const fetchLogsTask = setInterval(fetchLogs, 3000);

        update.addEventListener("click", () => {
            update.disabled = true;
            clearInterval(fetchLogsTask);
            fetch("/update", {
                method: "POST",
            }).then(() => {
                let duration = 5;
                updateStatus.innerText = `Entered boot mode. Reloading in ${duration}s...`;
                const interval = setInterval(() => {
                    updateStatus.innerText = `Entered boot mode. Reloading in ${--duration}s...`;
                    if (duration <= 0) {
                        clearInterval(interval);
                        location.reload();
                    }
                }, 1000);
            });
        });
    </script>
</html>
